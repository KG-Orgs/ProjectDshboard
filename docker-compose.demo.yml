# =============================================================
# docker-compose.demo.yml — Shared demo (Neon Postgres, no local DB)
#
# Runs web + API only. Point DATABASE_URL at the shared Neon instance.
# Redis is optional (indexing queue health reports "skipped" without it).
#
# Usage:
#   cp .env.example .env   # fill DATABASE_URL, OAuth, AI keys
#   docker compose -f docker-compose.demo.yml up -d --build
#   open http://localhost:3000
#
# For a public demo URL, deploy this stack on a VM or use Render (see docs/DEMO_DEPLOYMENT.md).
# =============================================================

version: "3.9"

networks:
  demo_net:
    driver: bridge

services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: contractor_demo_backend
    restart: unless-stopped
    networks:
      - demo_net
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Neon connection string}
      REDIS_URL: ${REDIS_URL:-}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3001}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:?Set MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:?Set MICROSOFT_CLIENT_SECRET}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://localhost:3000/auth/callback}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      RETRIEVAL_HYBRID_ENABLED: ${RETRIEVAL_HYBRID_ENABLED:-true}
      RETRIEVAL_RERANK_ENABLED: ${RETRIEVAL_RERANK_ENABLED:-true}
      RETRIEVAL_RERANK_PROVIDER: ${RETRIEVAL_RERANK_PROVIDER:-llm}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health/api || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-ContractorAI}
    container_name: contractor_demo_web
    restart: unless-stopped
    networks:
      - demo_net
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      BACKEND_API_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-ContractorAI}
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
