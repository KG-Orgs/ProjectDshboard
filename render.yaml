# Render Blueprint — one-click demo deploy (web + API + external Neon DB)
# Docs: docs/DEMO_DEPLOYMENT.md
#
# After connecting this repo in Render:
#   1. Set sync: false secrets in the dashboard (DATABASE_URL, OAuth, AI keys)
#   2. Deploy blueprint
#   3. Add Azure redirect URI: https://<web-service>.onrender.com/auth/callback
#
# plan: free — $0 but services spin down after ~15 min idle (cold start on next request).

services:
  - type: web
    name: contractorai-api
    runtime: docker
    dockerfilePath: ./packages/backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health/api
    dockerCommand: node packages/backend/dist/backend/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: API_BASE_URL
        fromService:
          type: web
          name: contractorai-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: WEB_ORIGIN
        fromService:
          type: web
          name: contractorai-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        value: common
      - key: OAUTH_REDIRECT_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RETRIEVAL_HYBRID_ENABLED
        value: "true"
      - key: RETRIEVAL_RERANK_ENABLED
        value: "true"
      - key: RETRIEVAL_RERANK_PROVIDER
        value: llm
      - key: PLATFORM_OPERATOR_EMAILS
        sync: false

  - type: web
    name: contractorai-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    dockerCommand: node apps/web/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: BACKEND_API_URL
        fromService:
          type: web
          name: contractorai-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: contractorai-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_APP_NAME
        value: ContractorAI
